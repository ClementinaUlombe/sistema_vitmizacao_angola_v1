version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/app/prisma/dev.db # Path inside the container
    volumes:
      - .:/app # Mount the current directory into the container for development
      - /app/node_modules # Exclude node_modules from the bind mount
    restart: always
